<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miami → East Falmouth · June 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --navy: #0d1b2a;
    --navy-mid: #162535;
    --navy-light: #1e3350;
    --steel: #2d4a6b;
    --horizon: #c8d8e8;
    --wake: #e8f0f8;
    --gold: #c8a84b;
    --gold-light: #e0c470;
    --red: #c0392b;
    --track-active: #f0c040;
    --text: #dce8f4;
    --text-dim: #8aaccc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Georgia', serif;
    background: var(--navy);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: var(--navy-mid);
    border-bottom: 1px solid var(--steel);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .header-compass {
    font-size: 22px;
    line-height: 1;
  }

  header h1 {
    font-size: 16px;
    font-weight: normal;
    letter-spacing: 0.08em;
    color: var(--gold-light);
    text-transform: uppercase;
  }
  header h1 span {
    color: var(--text-dim);
    font-size: 12px;
    display: block;
    letter-spacing: 0.05em;
    margin-top: 2px;
    font-family: 'Courier New', monospace;
    text-transform: none;
  }

  .header-totals {
    margin-left: auto;
    display: flex;
    gap: 20px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .header-totals strong { color: var(--gold); font-size: 14px; display: block; }

  /* ── LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--navy-mid);
    border-right: 1px solid var(--steel);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-inner {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
  }

  .sidebar-inner::-webkit-scrollbar { width: 4px; }
  .sidebar-inner::-webkit-scrollbar-track { background: var(--navy-mid); }
  .sidebar-inner::-webkit-scrollbar-thumb { background: var(--steel); border-radius: 2px; }

  .leg-card {
    padding: 10px 14px;
    border-left: 3px solid transparent;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }

  .leg-card:hover { background: var(--navy-light); }
  .leg-card.active {
    background: var(--navy-light);
    border-left-color: var(--gold);
  }

  .leg-num {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }

  .leg-label {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 5px;
    line-height: 1.3;
  }

  .leg-stats {
    display: flex;
    gap: 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .leg-stats .val { color: var(--horizon); }

  .leg-actions {
    margin-top: 8px;
    display: flex;
    gap: 6px;
  }

  .btn-dl, .btn-share {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 9px;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-decoration: none;
    border: 1px solid;
    transition: all 0.15s;
    user-select: none;
  }

  .btn-dl {
    background: transparent;
    border-color: var(--gold);
    color: var(--gold);
  }
  .btn-dl:hover {
    background: var(--gold);
    color: var(--navy);
  }

  .btn-share {
    background: transparent;
    border-color: var(--steel);
    color: var(--text-dim);
  }
  .btn-share:hover {
    border-color: var(--horizon);
    color: var(--text);
  }

  .divider { height: 1px; background: var(--steel); margin: 4px 14px; opacity: 0.5; }

  /* ── MAP ── */
  #map {
    flex: 1;
    background: var(--navy);
  }

  /* ── TOOLTIP ── */
  .leg-tooltip {
    background: var(--navy-mid) !important;
    border: 1px solid var(--gold) !important;
    border-radius: 4px !important;
    color: var(--text) !important;
    font-family: 'Courier New', monospace !important;
    font-size: 12px !important;
    padding: 6px 10px !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5) !important;
  }

  /* ── SHARE TOAST ── */
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--navy-mid);
    border: 1px solid var(--gold);
    color: var(--text);
    padding: 8px 18px;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    transition: transform 0.25s ease;
    z-index: 9999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── MAP LEGEND ── */
  .map-legend {
    position: absolute;
    bottom: 20px;
    right: 10px;
    z-index: 1000;
    background: rgba(13,27,42,0.88);
    border: 1px solid var(--steel);
    border-radius: 4px;
    padding: 8px 12px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: var(--text-dim);
    pointer-events: none;
  }
  .map-legend div { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .map-legend div:last-child { margin-bottom: 0; }
  .swatch { width: 24px; height: 3px; border-radius: 2px; }
</style>
</head>

  zoomControl: true,
  attributionControl: true,
});

// Dark nautical-style tile layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd',
  maxZoom: 18
}).addTo(map);

// Subtle labels on top
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd',
  maxZoom: 18,
  opacity: 0.6,
  pane: 'overlayPane',
}).addTo(map);

// ── TRACK POLYLINES ───────────────────────────────────────
const polylines = [];
let activeLeg = null;

LEGS.forEach((leg, i) => {
  const color = COLORS[i % COLORS.length];
  const coords = leg.thin_coords.map(c => [c[0], c[1]]);
  
  const pl = L.polyline(coords, {
    color: color,
    weight: 2.5,
    opacity: 0.75,
    smoothFactor: 1,
  }).addTo(map);

  pl.bindTooltip(`<b>${leg.label}</b><br>${leg.date} · ${leg.dist_nm} nm`, {
    className: 'leg-tooltip',
    sticky: true,
  });

  pl.on('click', () => selectLeg(i));
  pl.on('mouseover', () => {
    if (activeLeg === null) pl.setStyle({ weight: 4.5, opacity: 1 });
  });
  pl.on('mouseout', () => {
    if (activeLeg === null) pl.setStyle({ weight: 2.5, opacity: 0.75 });
  });

  // Start/end markers
  L.circleMarker(coords[0], {
    radius: 4, fillColor: color, color: '#fff', weight: 1, fillOpacity: 1
  }).addTo(map);
  
  L.circleMarker(coords[coords.length - 1], {
    radius: 4, fillColor: color, color: '#fff', weight: 1, fillOpacity: 1
  }).addTo(map);

  polylines.push(pl);
});

// ── SIDEBAR ────────────────────────────────────────────────
const legList = document.getElementById('leg-list');

LEGS.forEach((leg, i) => {
  const color = COLORS[i % COLORS.length];
  const date = new Date(leg.date + 'T12:00:00Z');
  const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
  
  const card = document.createElement('div');
  card.className = 'leg-card';
  card.dataset.index = i;
  card.style.borderLeftColor = 'transparent';

  card.innerHTML = `
    <div class="leg-num">LEG ${String(i+1).padStart(2,'0')} · ${dateStr}</div>
    <div class="leg-label">${leg.label}</div>
    <div class="leg-stats">
      <span><span class="val">${leg.dist_nm}</span> nm</span>
      <span><span class="val">${leg.max_kts}</span> kts max</span>
      <span><span class="val">${leg.dur_h}</span> hr</span>
    </div>
    <div class="leg-actions">
      <a class="btn-dl" href="${leg.file}" download="${leg.file}" title="Download GPX for Raymarine import">⬇ GPX</a>
      <span class="btn-share" onclick="shareLeg(${i})">⎘ Share</span>
    </div>
  `;

  card.addEventListener('click', (e) => {
    if (e.target.classList.contains('btn-dl') || e.target.classList.contains('btn-share')) return;
    selectLeg(i);
  });

  legList.appendChild(card);

  if (i < LEGS.length - 1) {
    const div = document.createElement('div');
    div.className = 'divider';
    legList.appendChild(div);
  }
});

function selectLeg(i) {
  const cards = document.querySelectorAll('.leg-card');

  if (activeLeg !== null) {
    polylines.forEach((pl, idx) => {
      pl.setStyle({ weight: 2.5, opacity: 0.75, color: COLORS[idx % COLORS.length] });
    });
    cards[activeLeg].classList.remove('active');
    cards[activeLeg].style.borderLeftColor = 'transparent';
  }

  if (activeLeg === i) {
    activeLeg = null;
    fitAll();
    return;
  }

  activeLeg = i;

  // Dim all other tracks
  polylines.forEach((pl, idx) => {
    if (idx !== i) {
      pl.setStyle({ weight: 1.5, opacity: 0.12, color: COLORS[idx % COLORS.length] });
    }
  });

  // Selected track: own color, thick, on top
  polylines[i].setStyle({ weight: 7, opacity: 1, color: COLORS[i % COLORS.length] });
  polylines[i].bringToFront();

  cards[i].classList.add('active');
  cards[i].style.borderLeftColor = COLORS[i % COLORS.length];
  cards[i].scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  map.flyToBounds(polylines[i].getBounds(), { padding: [60, 60], maxZoom: 9, duration: 0.8 });
}

function fitAll() {
  const allBounds = polylines.map(p => p.getBounds());
  const combined = allBounds.reduce((acc, b) => acc.extend(b));
  map.fitBounds(combined, { padding: [30, 30] });
}

fitAll();

// ── SHARE ─────────────────────────────────────────────────
function shareLeg(i) {
  const leg = LEGS[i];
  // Build a geo: URI / info string for sharing
  const url = window.location.href.split('?')[0];
  const shareText = `${leg.label} — ${leg.date} — ${leg.dist_nm} nm, max ${leg.max_kts} kts`;
  
  // Try clipboard API
  const toCopy = `${shareText}\nDownload GPX: (open the passage tracks page and click GPX for Leg ${i+1})`;
  
  if (navigator.share) {
    navigator.share({
      title: leg.label,
      text: shareText,
    }).catch(() => copyToClipboard(leg.label));
  } else {
    copyToClipboard(`${leg.label} · ${leg.date} · ${leg.dist_nm} nm · max ${leg.max_kts} kts`);
  }
}

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = '✓ Leg info copied to clipboard';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  });
}
</script>
</body>
</html>
